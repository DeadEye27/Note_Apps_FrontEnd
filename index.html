<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/styles.css">
    <title>Note Apps</title>
</head>
<body>
    <div class="header">
        <div class="header-logo">DEADEYE'S NOTE</div>
        <ul class="header-buttons">
            <li>
                <!-- <a href="//" target="_blank" rel="noopener noreferrer">Add Note</a> -->
                <button class="add-note-button" onclick="openForm()">New Note</button>
            </li>
            <li>
                <search>
                    <form action="">
                        <input type="fsrch" name="search_bar" id="search_bar" placeholder="Search Note">
                    </form>
                </search>
            </li>
        </ul>
    </div>
    <div class="form-popup" id="myForm">
        <form action="" class="form-container">
            <h1>New Note</h1>
            <label for="inputTitle"><b>Title</b></label>
            <input type="text" placeholder="Enter Title" name="title" id="inputTitle" required>
            <label for="inputNotes"><b>Notes</b></label>
            <textarea name="userNote" id="inputNotes" cols="30" rows="10" placeholder="Enter Notes" required></textarea>
            <div class="form-button-container">
                <button type="submit" class="btn" id="noteSubmit">Save</button>
                <button type="button" class="btn cancel" onclick="closeForm()">Cancel</button>
            </div>
        </form>
    </div>
    <div class="form-edit-container" id="editFormContainer">
        <form action="" class="editForm">
            <h1>Edit Note</h1>
            <label for="editedTitleInput"><b>Title</b></label>
            <input type="text" placeholder="Enter Edited Title" name="title" id="editedTitleInput" required>
            <label for="editedNotesInput"><b>Notes</b></label>
            <textarea name="userNote" id="editedNotesInput" cols="30" rows="10" placeholder="Enter Notes" required></textarea>
            <div class="form-button-container">
                <button type="submit" class="btn" id="editedNoteSubmit">Save</button>
                <button type="button" class="btn cancel" onclick="closeForm()">Cancel</button>
            </div>
        </form>
    </div>
    <div class="card-container" id="card-container">
        <p id="no-result-message">
            Catatan Tidak ditemukan
        </p>
    </div>
    <script src="js/script.js"></script>
</body>
</html>
